<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Gerenciador de Recompensas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            green: '#22c55e',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        },
                        dark: {
                            bg: '#0b0e14',
                            surface: '#161b22',
                            card: '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-blue': '0 0 15px rgba(59,130,246,0.5)',
                        'neon-green': '0 0 15px rgba(34,197,94,0.5)',
                        'neon-pink': '0 0 15px rgba(236,72,153,0.5)',
                        'neon-cyan': '0 0 15px rgba(6,182,212,0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(0,0,0,0.5)',
                        'btn-press': 'inset 0 4px 6px rgba(0,0,0,0.3)'
                    },
                    backgroundImage: {
                        'radial-burst': 'radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%)',
                        'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .input-gaming {
            background: rgba(11, 14, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.2);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gaming:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide for mobile focus */
        }
        
        /* Particle animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* Toggle Switch Gaming */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }
        
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: #161b22;
            border: 2px solid #4b5563;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #9ca3af;
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Custom Radio/Checkbox gaming style */
        .radio-gaming:checked + div {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5);
            background-color: rgba(168,85,247,0.1);
        }
        .radio-gaming:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex flex-col font-body bg-radial-burst relative overflow-x-hidden m-0 p-0">

    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-neon-purple opacity-10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-neon-blue opacity-10 blur-[120px]"></div>
    </div>

    <!-- Main Container - Mobile First (375x840 target) -->
    <main class="w-full max-w-[430px] mx-auto min-h-[100dvh] flex flex-col relative z-10 pb-24">
        
        <!-- Top Navigation / Header -->
        <header id="app-header" class="w-full flex items-center justify-between px-6 py-5 sticky top-0 bg-dark-bg/80 backdrop-blur-md z-50 border-b border-gray-800">
            <button class="w-10 h-10 rounded-xl bg-dark-surface border border-gray-700 flex items-center justify-center text-white hover:border-neon-purple transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="font-display text-xl text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                Loja
            </h1>
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-900 to-indigo-900 border-2 border-neon-purple shadow-neon-purple overflow-hidden flex items-center justify-center">
                <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/f731e841a3-bb08ed68d9fe92d3ffb8.png" alt="Parent Avatar" />
            </div>
        </header>

        <div class="px-6 py-6 flex flex-col gap-6 flex-1">

            <!-- Header & Stats Summary -->
            <section id="reward-stats-summary" class="flex flex-col gap-4">
                <div class="flex justify-between items-end mb-2">
                    <div class="flex flex-col">
                        <h2 class="font-display text-2xl text-white">Gerenciar Loja</h2>
                        <p class="text-sm text-gray-400">Crie prêmios incríveis</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-panel rounded-[20px] p-4 border border-neon-purple/30 relative overflow-hidden flex flex-col items-center justify-center gap-2">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-neon-purple opacity-10 blur-[20px] rounded-full"></div>
                        <div class="w-10 h-10 rounded-full bg-dark-bg border border-neon-purple/50 flex items-center justify-center">
                            <i class="fa-solid fa-box-open text-neon-purple text-lg"></i>
                        </div>
                        <span class="font-display text-2xl text-white">8</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Prêmios Ativos</span>
                    </div>
                    
                    <div class="glass-panel rounded-[20px] p-4 border border-neon-pink/30 relative overflow-hidden flex flex-col items-center justify-center gap-2">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-neon-pink opacity-10 blur-[20px] rounded-full"></div>
                        <div class="w-10 h-10 rounded-full bg-dark-bg border border-neon-pink/50 flex items-center justify-center">
                            <i class="fa-solid fa-ticket text-neon-pink text-lg"></i>
                        </div>
                        <span class="font-display text-2xl text-white">15</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Resgates Mês</span>
                    </div>
                </div>
            </section>

            <!-- Reward Creation Form -->
            <section id="reward-creation-form" class="flex flex-col gap-4">
                <div class="glass-panel rounded-[24px] p-5 border border-neon-purple/50 relative overflow-hidden flex flex-col gap-5 shadow-[0_0_30px_rgba(168,85,247,0.1)]">
                    <div class="absolute top-0 right-0 w-40 h-40 bg-neon-purple opacity-10 blur-[50px] rounded-full pointer-events-none"></div>
                    
                    <h3 class="font-display text-xl text-white flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-neon-purple"></i> Criar Novo Prêmio
                    </h3>

                    <!-- Name & Icon -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Nome do Prêmio</label>
                        <div class="relative">
                            <input type="text" placeholder="Ex: 1 Hora de Videogame" class="input-gaming w-full h-12 rounded-xl px-4 text-white placeholder-gray-500 font-bold focus:border-neon-purple focus:shadow-neon-purple" />
                            <button class="absolute right-2 top-2 w-8 h-8 rounded-lg bg-dark-bg border border-gray-700 flex items-center justify-center text-gray-400 hover:text-neon-purple transition-colors">
                                <i class="fa-solid fa-icons"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Cost & Stock -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Custo (Estrelas)</label>
                            <div class="relative">
                                <input type="number" placeholder="50" class="input-gaming w-full h-12 rounded-xl pl-10 pr-4 text-white placeholder-gray-500 font-bold focus:border-yellow-400 focus:shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                                <i class="fa-solid fa-star absolute left-4 top-4 text-yellow-400 text-sm"></i>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Estoque/Limite</label>
                            <div class="relative">
                                <input type="number" placeholder="∞" class="input-gaming w-full h-12 rounded-xl pl-10 pr-4 text-white placeholder-gray-500 font-bold focus:border-neon-blue" />
                                <i class="fa-solid fa-cubes absolute left-4 top-4 text-neon-blue text-sm"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Type Selection -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Tipo de Prêmio</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="relative cursor-pointer">
                                <input type="radio" name="reward_type" class="radio-gaming sr-only" checked />
                                <div class="h-16 rounded-xl border border-gray-700 bg-dark-surface flex flex-col items-center justify-center gap-1 transition-all">
                                    <i class="fa-solid fa-gamepad text-neon-purple text-lg"></i>
                                    <span class="text-[10px] font-bold text-white uppercase">Digital</span>
                                    <div class="check-icon absolute top-1 right-1 w-3 h-3 bg-neon-purple rounded-full opacity-0 scale-0 transition-all flex items-center justify-center">
                                        <i class="fa-solid fa-check text-[8px] text-white"></i>
                                    </div>
                                </div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="reward_type" class="radio-gaming sr-only" />
                                <div class="h-16 rounded-xl border border-gray-700 bg-dark-surface flex flex-col items-center justify-center gap-1 transition-all">
                                    <i class="fa-solid fa-person-running text-neon-green text-lg"></i>
                                    <span class="text-[10px] font-bold text-white uppercase">Atividade</span>
                                    <div class="check-icon absolute top-1 right-1 w-3 h-3 bg-neon-purple rounded-full opacity-0 scale-0 transition-all flex items-center justify-center">
                                        <i class="fa-solid fa-check text-[8px] text-white"></i>
                                    </div>
                                </div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="reward_type" class="radio-gaming sr-only" />
                                <div class="h-16 rounded-xl border border-gray-700 bg-dark-surface flex flex-col items-center justify-center gap-1 transition-all">
                                    <i class="fa-solid fa-gift text-neon-pink text-lg"></i>
                                    <span class="text-[10px] font-bold text-white uppercase">Objeto</span>
                                    <div class="check-icon absolute top-1 right-1 w-3 h-3 bg-neon-purple rounded-full opacity-0 scale-0 transition-all flex items-center justify-center">
                                        <i class="fa-solid fa-check text-[8px] text-white"></i>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Rarity/Highlight -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Raridade / Destaque</label>
                        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-2 px-2">
                            <label class="shrink-0 relative cursor-pointer">
                                <input type="radio" name="rarity" class="radio-gaming sr-only" checked />
                                <div class="px-4 py-2 rounded-xl border border-gray-700 bg-dark-surface flex items-center gap-2 transition-all">
                                    <div class="w-3 h-3 rounded-full bg-gray-400"></div>
                                    <span class="text-xs font-bold text-white">Comum</span>
                                </div>
                            </label>
                            <label class="shrink-0 relative cursor-pointer">
                                <input type="radio" name="rarity" class="radio-gaming sr-only" />
                                <div class="px-4 py-2 rounded-xl border border-neon-blue/50 bg-dark-surface flex items-center gap-2 transition-all">
                                    <div class="w-3 h-3 rounded-full bg-neon-blue shadow-neon-blue"></div>
                                    <span class="text-xs font-bold text-white">Raro</span>
                                </div>
                            </label>
                            <label class="shrink-0 relative cursor-pointer">
                                <input type="radio" name="rarity" class="radio-gaming sr-only" />
                                <div class="px-4 py-2 rounded-xl border border-neon-purple/50 bg-dark-surface flex items-center gap-2 transition-all">
                                    <div class="w-3 h-3 rounded-full bg-neon-purple shadow-neon-purple"></div>
                                    <span class="text-xs font-bold text-white">Épico</span>
                                </div>
                            </label>
                            <label class="shrink-0 relative cursor-pointer">
                                <input type="radio" name="rarity" class="radio-gaming sr-only" />
                                <div class="px-4 py-2 rounded-xl border border-yellow-400/50 bg-dark-surface flex items-center gap-2 transition-all">
                                    <div class="w-3 h-3 rounded-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.5)]"></div>
                                    <span class="text-xs font-bold text-white">Lendário</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Submit Action -->
                    <button class="btn-gaming w-full h-14 mt-2 rounded-xl bg-gradient-to-r from-neon-purple to-indigo-600 text-white font-display text-lg tracking-wide shadow-neon-purple border-b-4 border-indigo-900 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> Adicionar à Loja
                    </button>
                </div>
            </section>

            <!-- Active Rewards List -->
            <section id="active-rewards-list" class="flex flex-col gap-4 mt-2">
                <div class="flex items-center gap-2">
                            <button class="text-gray-500 hover:text-neon-blue transition-colors">
                                <i class="fa-solid fa-pen text-xs"></i>
                            </button>
                            <button class="text-gray-500 hover:text-neon-pink transition-colors">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </section>

        </div>

        <!-- Bottom Navigation Bar (Copied 1:1 from context) -->
        <nav class="fixed bottom-0 left-0 w-full bg-dark-bg/95 backdrop-blur-xl border-t border-gray-800 pb-safe z-50">
            <div class="max-w-[430px] mx-auto flex justify-around items-center h-20 px-2">
                <!-- Painel (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Painel</span>
                </a>
                
                <!-- Missões (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-list-check text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Missões</span>
                </a>
                
                <!-- Filhos (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-users text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Filhos</span>
                </a>
                
                <!-- Recompensas (Active) -->
                <a href="#" class="flex flex-col items-center justify-center w-20 h-full relative group">
                    <div class="absolute -top-5 w-14 h-14 rounded-full bg-dark-surface border-2 border-neon-purple shadow-neon-purple flex items-center justify-center group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-gift text-neon-purple text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold uppercase text-neon-purple mt-8">Prêmios</span>
                </a>
                
                <!-- Aprovação (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-check-double text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Validar</span>
                </a>
            </div>
        </nav>

    </main>

    <style>
        @keyframes shimmer {
            100% { left: 200%; }
        }
    </style>

  <script>
    // nav liberada
  </script>
    <script src="tarefito-supabase.js"></script>
    <script src="tarefito-nav.js"></script>
</body>
</html>
