<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue:   '#3b82f6',
                            green:  '#22c55e',
                            pink:   '#ec4899',
                            cyan:   '#06b6d4'
                        },
                        dark: {
                            bg:      '#0b0e14',
                            surface: '#161b22',
                            card:    '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-green':  '0 0 15px rgba(34,197,94,0.5)',
                    },
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            background-image: radial-gradient(ellipse at 30% 10%, #1a0a2e 0%, #0b0e14 55%, #020408 100%);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Nunito', sans-serif;
        }

        .glass-panel {
            background: rgba(31,41,55,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .input-gaming {
            background: rgba(11,14,20,0.8);
            border: 2px solid rgba(168,85,247,0.3);
            transition: all 0.3s ease;
            width: 100%;
            height: 52px;
            padding-left: 44px;
            padding-right: 16px;
            border-radius: 14px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
        }
        .input-gaming::placeholder { color: #6b7280; }
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 12px rgba(168,85,247,0.4), inset 0 0 8px rgba(168,85,247,0.15);
            outline: none;
        }

        .input-gaming-green {
            background: rgba(11,14,20,0.8);
            border: 2px solid rgba(34,197,94,0.3);
            transition: all 0.3s ease;
            width: 100%;
            height: 52px;
            padding-left: 44px;
            padding-right: 16px;
            border-radius: 14px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .input-gaming-green::placeholder { color: #6b7280; text-transform: none; }
        .input-gaming-green:focus {
            border-color: #22c55e;
            box-shadow: 0 0 12px rgba(34,197,94,0.4), inset 0 0 8px rgba(34,197,94,0.15);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer;
            border: none;
        }
        .btn-gaming:active {
            transform: translateY(3px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        .profile-card {
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            filter: grayscale(0.5) opacity(0.7);
            cursor: pointer;
        }
        .profile-card.active {
            filter: grayscale(0) opacity(1);
            transform: scale(1.04);
            border-color: var(--active-color) !important;
            box-shadow: 0 0 20px var(--active-glow);
        }

        .toggle-track {
            width: 40px; height: 22px;
            background: #161b22;
            border-radius: 999px;
            border: 1px solid #4b5563;
            position: relative;
            transition: all 0.3s;
        }
        .toggle-track.on { background: rgba(168,85,247,0.2); border-color: #a855f7; }
        .toggle-thumb {
            position: absolute;
            top: 3px; left: 3px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #9ca3af;
            transition: all 0.3s;
            box-shadow: 0 0 6px rgba(168,85,247,0.5);
        }
        .toggle-track.on .toggle-thumb { transform: translateX(18px); background: #a855f7; }
    </style>
</head>
<body>

    <!-- Ambient blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full opacity-[0.08] blur-[80px] pointer-events-none" style="background:#a855f7;"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full opacity-[0.08] blur-[100px] pointer-events-none" style="background:#3b82f6;"></div>

    <!-- Main Container - Mobile First (375x840 target) -->
    <main class="w-full max-w-[430px] mx-auto min-h-[100dvh] flex flex-col relative z-10 px-6 py-5">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-4">
            <div class="relative flex items-center justify-center">
                <div class="absolute w-[110px] h-[110px] rounded-full opacity-20 blur-[36px]" style="background:#a855f7;"></div>
                <img src="logo.png" alt="Tarefito"
                     class="relative z-10"
                     style="width:70%; object-fit:contain;
                            filter:drop-shadow(0 0 18px rgba(168,85,247,0.65)) drop-shadow(0 0 6px rgba(59,130,246,0.4));"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
                <h1 style="display:none; font-family:'Fredoka One',cursive; font-size:36px;
                           background:linear-gradient(180deg,#fff 0%,#a855f7 50%,#3b82f6 100%);
                           -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
                           filter:drop-shadow(0 0 10px rgba(168,85,247,0.7)); margin:0; line-height:1;">TAREFITO</h1>
            </div>
            
        </div>

        <!-- Profile Selection -->
        <div class="my-4">
            <p class="text-center text-gray-300 font-bold text-xs uppercase tracking-widest mb-2">Escolha seu perfil</p>
            <div class="grid grid-cols-2 gap-3 my-6">

                <!-- Responsável -->
                <div class="profile-card glass-panel active"
                     style="border-radius:20px; padding:14px 10px 12px; display:flex; flex-direction:column; align-items:center;
                            border:2px solid #a855f7; position:relative; overflow:hidden;
                            --active-color:#a855f7; --active-glow:rgba(168,85,247,0.45);"
                     onclick="selectProfile(this,'adult')">
                    <div style="position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%;
                                background:#0b0e14; border:1px solid #a855f7;
                                display:flex; align-items:center; justify-content:center;
                                box-shadow:0 0 8px rgba(168,85,247,0.5);">
                        <i class="fa-solid fa-check check-icon" style="color:#a855f7; font-size:8px; opacity:1;"></i>
                    </div>
                    <img src="icon-responsavel.png" alt="Responsável"
                         style="width:289px; height:89px; object-fit:contain; margin-bottom:8px;
                                filter:drop-shadow(0 0 16px rgba(168,85,247,0.8));"
                         onerror="this.outerHTML='<div style=\'width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#581c87,#3730a3);box-shadow:0 0 14px rgba(168,85,247,0.6);margin-bottom:8px;\'></div>';" />
                    <span style="font-family:'Fredoka One',cursive; color:#fff; font-size:16px;">Responsáveis</span>
                    <span style="font-size:15px; color:#c084fc; font-weight:700; margin-top:2px;">Mestres das Missões</span>
                </div>

                <!-- Aventureiro -->
                <div class="profile-card glass-panel"
                     style="border-radius:20px; padding:14px 10px 12px; display:flex; flex-direction:column; align-items:center;
                            border:2px solid transparent; position:relative; overflow:hidden;
                            --active-color:#22c55e; --active-glow:rgba(34,197,94,0.45);"
                     onclick="selectProfile(this,'child')">
                    <div style="position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%;
                                background:#0b0e14; border:1px solid #4b5563;
                                display:flex; align-items:center; justify-content:center;">
                        <i class="fa-solid fa-check check-icon" style="color:#22c55e; font-size:8px; opacity:0;"></i>
                    </div>
                    <img src="icon-aventureiro.png" alt="Aventureiro"
                         style="width:610px; height: 99px; object-fit:contain; margin-bottom:8px;
                                filter:drop-shadow(0 0 16px rgba(34,197,94,0.65));"
                         onerror="this.outerHTML='<div style=\'width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#14532d,#134e4a);margin-bottom:8px;\'></div>';" />
                    <span style="font-family:'Fredoka One',cursive; color:#fff; font-size:16px;">Aventureiros</span>
                    <span style="font-size:15px; color:#86efac; font-weight:700; margin-top:2px;">Heróis da Missão</span>
                </div>

            </div>
        </div>

        <!-- Login Form Card -->
        <div id="login_credentials_form" class="glass-panel" style="border-radius:24px; padding:16px 16px; position:relative; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5);">

            <!-- Decorative corners -->
            <div style="position:absolute;top:0;left:0;width:24px;height:24px;border-top:2px solid #a855f7;border-left:2px solid #a855f7;border-radius:28px 0 0 0;opacity:0.5;"></div>
            <div style="position:absolute;top:0;right:0;width:24px;height:24px;border-top:2px solid #a855f7;border-right:2px solid #a855f7;border-radius:0 28px 0 0;opacity:0.5;"></div>
            <div style="position:absolute;bottom:0;left:0;width:24px;height:24px;border-bottom:2px solid #a855f7;border-left:2px solid #a855f7;border-radius:0 0 0 28px;opacity:0.5;"></div>
            <div style="position:absolute;bottom:0;right:0;width:24px;height:24px;border-bottom:2px solid #a855f7;border-right:2px solid #a855f7;border-radius:0 0 28px 0;opacity:0.5;"></div>

            <h3 style="font-family:'Fredoka One',cursive; color:#fff; font-size:16px; margin:0 0 12px;">Acesso Seguro</h3>

            <!-- Email (adult) -->
            <div id="email-input-group" style="position:relative; margin-bottom:8px;">
                <div style="position:absolute; top:50%; left:14px; transform:translateY(-50%); color:#a855f7; opacity:0.75; font-size:14px; pointer-events:none;">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <input type="text" placeholder="Email ou Telefone" class="input-gaming" />
            </div>

            <!-- Password (adult) -->
            <div id="password-input-group" style="position:relative; margin-bottom:8px;">
                <div style="position:absolute; top:50%; left:14px; transform:translateY(-50%); color:#a855f7; opacity:0.75; font-size:14px; pointer-events:none;">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <input type="password" placeholder="Senha Mestra" class="input-gaming" style="padding-right:44px;" />
                <button type="button" onclick="togglePassword(this)" style="position:absolute; top:50%; right:14px; transform:translateY(-50%); background:none; border:none; color:#6b7280; cursor:pointer; font-size:14px;">
                    <i class="fa-solid fa-eye-slash"></i>
                </button>
            </div>

            <!-- Code (child) -->
            <div id="pin_entry_overlay" style="display:none; flex-direction:column; align-items:center; margin-bottom:12px;">
                <p style="color:#22c55e; font-size:12px; font-weight:700; margin:0 0 10px;">Digite seu Código Secreto</p>
                <div style="position:relative; width:100%;">
                    <div style="position:absolute; top:50%; left:14px; transform:translateY(-50%); color:#22c55e; opacity:0.75; font-size:14px; pointer-events:none;">
                        <i class="fa-solid fa-key"></i>
                    </div>
                    <input type="text" placeholder="Ex: ABC-1234" maxlength="8" class="input-gaming-green" />
                </div>
            </div>

            <!-- Toggle + Forgot -->
            <div style="display:flex; align-items:center; justify-content:space-between; margin:6px 0 10px; padding:0 2px;">
                <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="toggleSwitch(this)">
                    <div class="toggle-track on">
                        <div class="toggle-thumb"></div>
                    </div>
                    <span style="font-size:12px; color:#d1d5db; font-weight:700;">Lembrar nave</span>
                </div>
                <a href="#" style="font-size:12px; color:#3b82f6; font-weight:700; text-decoration:none; text-shadow:0 0 6px rgba(59,130,246,0.6);">Esqueci a chave</a>
            </div>

            <!-- CTA -->
            <button type="button" id="cta-btn" class="btn-gaming"
                    style="width:100%; height:52px; border-radius:14px;
                           background:linear-gradient(90deg,#a855f7,#3b82f6); color:#fff;
                           font-family:'Fredoka One',cursive; font-size:18px; letter-spacing:0.08em;
                           box-shadow:0 0 20px rgba(168,85,247,0.55), inset 0 2px 0 rgba(255,255,255,0.25);
                           border-bottom:4px solid #581c87;
                           display:flex; align-items:center; justify-content:center; gap:8px;">
                INICIAR MISSÃO <i class="fa-solid fa-rocket" style="font-size:14px;"></i>
            </button>

            <p style="text-align:center; margin:10px 0 0; font-size:12px; color:#9ca3af;">
                Novo explorador?
                <a href="#" style="color:#ec4899; font-weight:700; text-decoration:none; text-shadow:0 0 6px rgba(236,72,153,0.6); margin-left:4px;">Criar Base</a>
            </p>
        </div>

    </main><!-- /main -->

    <script>
        function selectProfile(element, type) {
            document.querySelectorAll('.profile-card').forEach(card => {
                card.classList.remove('active');
                card.style.borderColor = 'transparent';
                const ci = card.querySelector('.check-icon');
                ci.style.opacity = '0';
                ci.parentElement.style.borderColor = '#4b5563';
                ci.parentElement.style.boxShadow = 'none';
            });

            element.classList.add('active');

            const checkIcon    = element.querySelector('.check-icon');
            checkIcon.style.opacity = '1';

            const emailGroup    = document.getElementById('email-input-group');
            const passwordGroup = document.getElementById('password-input-group');
            const pinGroup      = document.getElementById('pin_entry_overlay');
            const form          = document.getElementById('login_credentials_form');
            const ctaBtn        = document.getElementById('cta-btn');

            form.querySelectorAll('[style*="border-top:2px"],[style*="border-bottom:2px"]').forEach(el => {
                el.style.borderColor = type === 'adult' ? '#a855f7' : '#22c55e';
            });

            if (type === 'adult') {
                element.style.borderColor = '#a855f7';
                checkIcon.parentElement.style.borderColor = '#a855f7';
                checkIcon.parentElement.style.boxShadow  = '0 0 8px rgba(168,85,247,0.5)';
                emailGroup.style.display    = 'block';
                passwordGroup.style.display = 'block';
                pinGroup.style.display      = 'none';
                form.style.boxShadow        = '0 8px 32px rgba(0,0,0,0.5)';
                ctaBtn.style.background     = 'linear-gradient(90deg,#a855f7,#3b82f6)';
                ctaBtn.style.boxShadow      = '0 0 20px rgba(168,85,247,0.55), inset 0 2px 0 rgba(255,255,255,0.25)';
                ctaBtn.style.borderBottomColor = '#581c87';
            } else {
                element.style.borderColor = '#22c55e';
                checkIcon.parentElement.style.borderColor = '#22c55e';
                checkIcon.parentElement.style.boxShadow  = '0 0 8px rgba(34,197,94,0.5)';
                emailGroup.style.display    = 'none';
                passwordGroup.style.display = 'none';
                pinGroup.style.display      = 'flex';
                form.style.boxShadow        = '0 8px 32px rgba(34,197,94,0.1)';
                ctaBtn.style.background     = 'linear-gradient(90deg,#22c55e,#14b8a6)';
                ctaBtn.style.boxShadow      = '0 0 20px rgba(34,197,94,0.55), inset 0 2px 0 rgba(255,255,255,0.25)';
                ctaBtn.style.borderBottomColor = '#14532d';
            }
        }

        function togglePassword(btn) {
            const input = btn.previousElementSibling;
            const icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        function toggleSwitch(wrapper) {
            wrapper.querySelector('.toggle-track').classList.toggle('on');
        }
    </script>
    <script src="tarefito-supabase.js"></script>
    <script src="tarefito-nav.js"></script>
</body>
</html>
