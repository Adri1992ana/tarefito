<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Aprovação de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            green: '#22c55e',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        },
                        dark: {
                            bg: '#0b0e14',
                            surface: '#161b22',
                            card: '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-blue': '0 0 15px rgba(59,130,246,0.5)',
                        'neon-green': '0 0 15px rgba(34,197,94,0.5)',
                        'neon-pink': '0 0 15px rgba(236,72,153,0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(0,0,0,0.5)',
                        'btn-press': 'inset 0 4px 6px rgba(0,0,0,0.3)'
                    },
                    backgroundImage: {
                        'radial-burst': 'radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%)',
                        'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .input-gaming {
            background: rgba(11, 14, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.2);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gaming:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide for mobile focus */
        }
        
        /* Particle animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* Toggle Switch Gaming */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }
        
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: #161b22;
            border: 2px solid #4b5563;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #9ca3af;
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Custom Radio/Checkbox gaming style */
        .radio-gaming:checked + div {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59,130,246,0.5);
            background-color: rgba(59,130,246,0.1);
        }
        .radio-gaming:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "x7n1zsluda");
    </script>
</head>
<body class="min-h-[100dvh] w-full flex flex-col font-body bg-radial-burst relative overflow-x-hidden m-0 p-0">

    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-neon-purple opacity-10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-neon-blue opacity-10 blur-[120px]"></div>
    </div>

    <!-- Main Container - Mobile First (375x840 target) -->
    <main class="w-full max-w-[430px] mx-auto min-h-[100dvh] flex flex-col relative z-10 pb-24">
        
        <!-- Top Navigation / Header -->
        <header id="app-header" class="w-full flex items-center justify-between px-6 py-5 sticky top-0 bg-dark-bg/80 backdrop-blur-md z-50 border-b border-gray-800">
            <button class="w-10 h-10 rounded-xl bg-dark-surface border border-gray-700 flex items-center justify-center text-white hover:border-neon-purple transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="font-display text-xl text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                Aprovação
            </h1>
            <div class="w-10 h-10"></div>
        </header>

        <div class="px-6 py-6 flex flex-col gap-6 flex-1">

            <!-- Header & Stats Summary -->
            <section id="stats-summary" class="flex flex-col gap-4">
                <div class="flex justify-between items-end mb-2">
                    <div class="flex flex-col">
                        <h2 class="font-display text-2xl text-white">Fila de Revisão</h2>
                        <p id="subtitle-pendentes" class="text-sm text-gray-400">carregando…</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-panel rounded-[20px] p-4 border border-neon-blue/30 relative overflow-hidden flex flex-col items-center justify-center gap-2">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-neon-blue opacity-10 blur-[20px] rounded-full"></div>
                        <div class="w-10 h-10 rounded-full bg-dark-bg border border-neon-blue/50 flex items-center justify-center">
                            <i class="fa-solid fa-hourglass-half text-neon-blue text-lg"></i>
                        </div>
                        <span id="count-pendentes" class="font-display text-2xl text-white">—</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Pendentes</span>
                    </div>

                    <div class="glass-panel rounded-[20px] p-4 border border-neon-green/30 relative overflow-hidden flex flex-col items-center justify-center gap-2">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-neon-green opacity-10 blur-[20px] rounded-full"></div>
                        <div class="w-10 h-10 rounded-full bg-dark-bg border border-neon-green/50 flex items-center justify-center">
                            <i class="fa-solid fa-check-double text-neon-green text-lg"></i>
                        </div>
                        <span id="count-aprovadas" class="font-display text-2xl text-white">—</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Aprovadas</span>
                    </div>
                </div>
            </section>

            <!-- Pending Approval Queue -->
            <section id="approval-queue" class="flex flex-col gap-4">
            </section>

            <!-- Decision History & Analytics -->
            <section id="decision-history" class="flex flex-col gap-4 mt-4 mb-8">
                
            </section>

        </div>

        <!-- Rejection Feedback Modal (Hidden by default) -->
        <div id="rejection-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="document.getElementById('rejection-modal').classList.add('hidden')"></div>
            
            <div class="w-full max-w-sm glass-panel rounded-[32px] p-6 border-2 border-neon-pink/50 relative z-10 shadow-[0_0_40px_rgba(236,72,153,0.3)]">
                <div class="absolute top-0 left-0 w-32 h-32 bg-neon-pink opacity-10 blur-[40px] rounded-full pointer-events-none"></div>
                
                <div class="flex flex-col items-center text-center gap-4">
                    <div class="w-16 h-16 rounded-full bg-neon-pink/20 border-2 border-neon-pink flex items-center justify-center text-neon-pink text-2xl shadow-neon-pink mb-2">
                        <i class="fa-solid fa-rotate-left"></i>
                    </div>
                    
                    <h3 class="font-display text-xl text-white">Rejeitar Missão</h3>
                    <p class="text-sm font-bold text-gray-400">Explique o que precisa ser ajustado para ganhar as estrelas.</p>
                    
                    <div class="w-full flex flex-col gap-2 text-left mt-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Comentário (Obrigatório)</label>
                        <textarea placeholder="Ex: Faltou guardar os brinquedos no baú..." class="input-gaming w-full h-24 rounded-xl p-4 text-white placeholder-gray-500 font-bold resize-none focus:border-neon-pink focus:shadow-neon-pink"></textarea>
                    </div>
                    
                    <div class="w-full flex gap-3 mt-4">
                        <button onclick="document.getElementById('rejection-modal').classList.add('hidden')" class="flex-1 h-12 rounded-xl bg-dark-surface text-gray-300 font-bold text-sm border border-gray-600 hover:bg-gray-800 transition-colors">
                            Cancelar
                        </button>
                        <button class="btn-gaming flex-1 h-12 rounded-xl bg-gradient-to-r from-neon-pink to-rose-600 text-white font-display text-sm tracking-wide shadow-neon-pink border-b-4 border-rose-900 flex items-center justify-center">
                            Enviar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation Bar (Copied 1:1 from context) -->
        <nav class="fixed bottom-0 left-0 w-full bg-dark-bg/95 backdrop-blur-xl border-t border-gray-800 pb-safe z-50">
            <div class="max-w-[430px] mx-auto flex justify-around items-center h-20 px-2">
                <!-- Painel (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Painel</span>
                </a>
                
                <!-- Missões (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-list-check text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Missões</span>
                </a>
                
                <!-- Filhos (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-users text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Filhos</span>
                </a>
                
                <!-- Recompensas (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-gift text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Prêmios</span>
                </a>
                
                <!-- Aprovação (Active) -->
                <a href="#" class="flex flex-col items-center justify-center w-20 h-full relative group">
                    <div class="absolute -top-5 w-14 h-14 rounded-full bg-dark-surface border-2 border-neon-blue shadow-neon-blue flex items-center justify-center group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-check-double text-neon-blue text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold uppercase text-neon-blue mt-8">Validar</span>
                </a>
            </div>
        </nav>

    </main>

  <script>
    // nav liberada
  </script>
    <script src="tarefito-supabase.js"></script>
    <script src="tarefito-nav.js"></script>
</body>
</html>
