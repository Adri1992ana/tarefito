
<h2 class="sr-only">QR Code do site tarefito.com.br para compartilhar com os testadores.</h2>

<div style="text-align:center; padding: 1.5rem 1rem;">
  <p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:1.25rem;">Escaneie para acessar o site</p>
  <div id="qr" style="display:inline-block; padding:16px; background:#fff; border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary);"></div>
  <p style="font-size:12px; color:var(--color-text-secondary); margin-top:1rem;">tarefito.com.br</p>
  <button onclick="downloadQR()" style="margin-top:1rem;">
    <i class="ti ti-download" aria-hidden="true"></i> Baixar PNG
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const qr = new QRCode(document.getElementById('qr'), {
  text: 'https://tarefito.com.br',
  width: 200,
  height: 200,
  colorDark: '#0B0A24',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});

function downloadQR() {
  setTimeout(() => {
    const canvas = document.querySelector('#qr canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qrcode-tarefito.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }, 300);
}
</script>
