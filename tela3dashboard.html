<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Painel do Responsável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            green: '#22c55e',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        },
                        dark: {
                            bg: '#0b0e14',
                            surface: '#161b22',
                            card: '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-blue': '0 0 15px rgba(59,130,246,0.5)',
                        'neon-green': '0 0 15px rgba(34,197,94,0.5)',
                        'neon-pink': '0 0 15px rgba(236,72,153,0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(0,0,0,0.5)',
                        'btn-press': 'inset 0 4px 6px rgba(0,0,0,0.3)'
                    },
                    backgroundImage: {
                        'radial-burst': 'radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%)',
                        'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .input-gaming {
            background: rgba(11, 14, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.2);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gaming:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide for mobile focus */
        }
        
        /* Particle animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* Toggle Switch Gaming */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }
        
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: #161b22;
            border: 2px solid #4b5563;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #9ca3af;
            border-radius: 50%;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex flex-col font-body bg-radial-burst relative overflow-x-hidden m-0 p-0">

    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-neon-purple opacity-10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-neon-blue opacity-10 blur-[120px]"></div>
    </div>

    <!-- Main Container - Mobile First (375x840 target) -->
    <main class="w-full max-w-[430px] mx-auto min-h-[100dvh] flex flex-col relative z-10 pb-24">
        
        <!-- Top Navigation / Header -->
        <header id="app-header" class="w-full flex items-center justify-between px-6 py-5 sticky top-0 bg-dark-bg/80 backdrop-blur-md z-50 border-b border-gray-800">
            <button class="w-10 h-10 rounded-xl bg-dark-surface border border-gray-700 flex items-center justify-center text-white hover:border-neon-purple transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="font-display text-xl text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                Painel Central
            </h1>
            <div class="w-10 h-10"></div>
        </header>

        <div class="px-6 py-6 flex flex-col gap-6 flex-1">
            
            <!-- Global Stats Header -->
            <section id="global-stats" class="flex flex-col gap-4">
                <div class="flex gap-4">
                    <div class="flex-1 glass-panel rounded-[24px] p-5 border border-neon-purple/30 relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-neon-purple opacity-10 blur-[30px] rounded-full"></div>
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-8 h-8 rounded-lg bg-dark-bg border border-neon-purple/50 flex items-center justify-center">
                                <i class="fa-solid fa-star text-yellow-400 text-sm drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]"></i>
                            </div>
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Estrelas</span>
                        </div>
                        <div class="flex items-end gap-2">
                            <h2 class="font-display text-3xl text-white">0</h2>
                        </div>
                    </div>
                    
                    <div class="flex-1 glass-panel rounded-[24px] p-5 border border-neon-pink/30 relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-neon-pink opacity-10 blur-[30px] rounded-full"></div>
                        <div class="absolute top-3 right-3 w-2 h-2 rounded-full bg-neon-pink animate-ping"></div>
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-8 h-8 rounded-lg bg-dark-bg border border-neon-pink/50 flex items-center justify-center">
                                <i class="fa-solid fa-bell text-neon-pink text-sm"></i>
                            </div>
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Aprovar</span>
                        </div>
                        <div class="flex items-end gap-2">
                            <h2 class="font-display text-3xl text-white">0</h2>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Quick Actions Grid -->
            <section id="quick-actions" class="flex flex-col gap-3">
                <h3 class="font-display text-lg text-white mb-1">Ações Rápidas</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button class="glass-panel rounded-[20px] p-4 border border-gray-700 flex flex-col items-center justify-center gap-3 hover:border-neon-blue hover:bg-neon-blue/5 transition-all group">
                        <div class="w-12 h-12 rounded-full bg-dark-bg border border-gray-600 flex items-center justify-center group-hover:border-neon-blue group-hover:shadow-neon-blue transition-all">
                            <i class="fa-solid fa-plus text-neon-blue text-lg"></i>
                        </div>
                        <span class="text-xs font-bold text-gray-300">Criar Missão</span>
                    </button>
                    <button class="glass-panel rounded-[20px] p-4 border border-gray-700 flex flex-col items-center justify-center gap-3 hover:border-neon-pink hover:bg-neon-pink/5 transition-all group relative">
                        <div class="absolute top-2 right-2 w-4 h-4 rounded-full bg-neon-pink text-[9px] font-bold text-white flex items-center justify-center">0</div>
                        <div class="w-12 h-12 rounded-full bg-dark-bg border border-gray-600 flex items-center justify-center group-hover:border-neon-pink group-hover:shadow-neon-pink transition-all">
                            <i class="fa-solid fa-check-double text-neon-pink text-lg"></i>
                        </div>
                        <span class="text-xs font-bold text-gray-300">Aprovar</span>
                    </button>
                    <button class="glass-panel rounded-[20px] p-4 border border-gray-700 flex flex-col items-center justify-center gap-3 hover:border-yellow-400 hover:bg-yellow-400/5 transition-all group">
                        <div class="w-12 h-12 rounded-full bg-dark-bg border border-gray-600 flex items-center justify-center group-hover:border-yellow-400 group-hover:shadow-[0_0_15px_rgba(250,204,21,0.5)] transition-all">
                            <i class="fa-solid fa-gift text-yellow-400 text-lg"></i>
                        </div>
                        <span class="text-xs font-bold text-gray-300">Recompensas</span>
                    </button>
                    <button class="glass-panel rounded-[20px] p-4 border border-gray-700 flex flex-col items-center justify-center gap-3 hover:border-neon-purple hover:bg-neon-purple/5 transition-all group">
                        <div class="w-12 h-12 rounded-full bg-dark-bg border border-gray-600 flex items-center justify-center group-hover:border-neon-purple group-hover:shadow-neon-purple transition-all">
                            <i class="fa-solid fa-users text-neon-purple text-lg"></i>
                        </div>
                        <span class="text-xs font-bold text-gray-300">Trocar Criança</span>
                    </button>
                </div>
            </section>

            <!-- Child Progress Cards -->
            <section id="child-progress" class="flex flex-col gap-4 mt-2">
                <h3 class="font-display text-lg text-white flex items-center justify-between">
                    Progresso <span class="text-xs text-neon-blue font-body cursor-pointer">Ver Todos</span>
                </h3>
                </div>
        </nav>

    </main>

  <script>
    // nav liberada
  </script>
    <script src="tarefito-supabase.js"></script>
    <script src="tarefito-nav.js"></script>
</body>
</html>
