<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Gerenciador de Recompensas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            green: '#22c55e',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        },
                        dark: {
                            bg: '#0b0e14',
                            surface: '#161b22',
                            card: '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-blue': '0 0 15px rgba(59,130,246,0.5)',
                        'neon-green': '0 0 15px rgba(34,197,94,0.5)',
                        'neon-pink': '0 0 15px rgba(236,72,153,0.5)',
                        'neon-cyan': '0 0 15px rgba(6,182,212,0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(0,0,0,0.5)',
                        'btn-press': 'inset 0 4px 6px rgba(0,0,0,0.3)'
                    },
                    backgroundImage: {
                        'radial-burst': 'radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%)',
                        'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .input-gaming {
            background: rgba(11, 14, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.2);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gaming:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide for mobile focus */
        }
        
        /* Particle animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* Toggle Switch Gaming */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }
        
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: #161b22;
            border: 2px solid #4b5563;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #9ca3af;
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Custom Radio/Checkbox gaming style */
        .radio-gaming:checked + div {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5);
            background-color: rgba(168,85,247,0.1);
        }
        .radio-gaming:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "x7n1zsluda");
    </script>
</head>
<body class="min-h-[100dvh] w-full flex flex-col font-body bg-radial-burst relative overflow-x-hidden m-0 p-0">

    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-neon-purple opacity-10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-neon-blue opacity-10 blur-[120px]"></div>
    </div>

    <!-- Main Container - Mobile First (375x840 target) -->
    <main class="w-full max-w-[430px] mx-auto min-h-[100dvh] flex flex-col relative z-10 pb-24">
        
        <!-- Top Navigation / Header -->
        <header id="app-header" class="w-full flex items-center justify-between px-6 py-5 sticky top-0 bg-dark-bg/80 backdrop-blur-md z-50 border-b border-gray-800">
            <button class="w-10 h-10 rounded-xl bg-dark-surface border border-gray-700 flex items-center justify-center text-white hover:border-neon-purple transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="font-display text-xl text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                Loja
            </h1>
            <div class="w-10 h-10"></div>
        </header>

        <div class="px-6 py-6 flex flex-col gap-6 flex-1">

            <!-- Biblioteca de Recompensas -->
            <section id="reward-library" class="flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <h2 class="font-display text-lg text-white flex items-center gap-2">
                        <i class="fa-solid fa-trophy text-yellow-400 text-base"></i> Biblioteca de Prêmios
                    </h2>
                    <button onclick="addRewardTemplate()"
                            class="text-xs font-bold text-neon-purple flex items-center gap-1 hover:opacity-75 transition-opacity">
                        <i class="fa-solid fa-plus text-xs"></i> Novo
                    </button>
                </div>
                <div id="reward-template-list" class="flex flex-col gap-2"></div>
            </section>

            <!-- Header & Stats Summary -->
            <section id="reward-stats-summary" class="flex flex-col gap-4">
                <div class="flex justify-between items-end mb-2">
                    <div class="flex flex-col">
                        <h2 class="font-display text-2xl text-white">Gerenciar Loja</h2>
                        <p class="text-sm text-gray-400">Crie prêmios incríveis</p>
                    </div>
                </div>
            </section>

            <!-- Reward Creation Form -->
            <section id="reward-creation-form" class="flex flex-col gap-4">
                <div class="glass-panel rounded-[24px] p-5 border border-neon-purple/50 relative overflow-hidden flex flex-col gap-5 shadow-[0_0_30px_rgba(168,85,247,0.1)]">
                    <div class="absolute top-0 right-0 w-40 h-40 bg-neon-purple opacity-10 blur-[50px] rounded-full pointer-events-none"></div>
                    
                    <h3 class="font-display text-xl text-white flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-neon-purple"></i> Criar Novo Prêmio
                    </h3>

                    <!-- Name & Icon -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Nome do Prêmio</label>
                        <div class="relative">
                            <input type="text" placeholder="Ex: 1 Hora de Videogame" class="input-gaming w-full h-12 rounded-xl px-4 text-white placeholder-gray-500 font-bold focus:border-neon-purple focus:shadow-neon-purple" />
                            <button class="absolute right-2 top-2 w-8 h-8 rounded-lg bg-dark-bg border border-gray-700 flex items-center justify-center text-gray-400 hover:text-neon-purple transition-colors">
                                <i class="fa-solid fa-icons"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Cost -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Custo (Estrelas)</label>
                        <div class="relative">
                            <input type="number" placeholder="50" class="input-gaming w-full h-12 rounded-xl pl-10 pr-4 text-white placeholder-gray-500 font-bold focus:border-yellow-400 focus:shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                            <i class="fa-solid fa-star absolute left-4 top-4 text-yellow-400 text-sm"></i>
                        </div>
                    </div>

                    <!-- Submit Action -->
                    <button class="btn-gaming w-full h-14 mt-2 rounded-xl bg-gradient-to-r from-neon-purple to-indigo-600 text-white font-display text-lg tracking-wide shadow-neon-purple border-b-4 border-indigo-900 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> Adicionar à Loja
                    </button>
                </div>
            </section>

            <!-- Active Rewards List -->
            <section id="active-rewards-list" class="flex flex-col gap-3 mt-2">
                <h3 class="font-display text-lg text-white flex items-center gap-2">
                    <i class="fa-solid fa-gift text-neon-purple text-base"></i> Prêmios Cadastrados
                </h3>
            </section>

        </div>

        <!-- Bottom Navigation Bar (Copied 1:1 from context) -->
        <nav class="fixed bottom-0 left-0 w-full bg-dark-bg/95 backdrop-blur-xl border-t border-gray-800 pb-safe z-50">
            <div class="max-w-[430px] mx-auto flex justify-around items-center h-20 px-2">
                <!-- Painel (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Painel</span>
                </a>
                
                <!-- Missões (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-list-check text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Missões</span>
                </a>
                
                <!-- Filhos (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-users text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Filhos</span>
                </a>
                
                <!-- Recompensas (Active) -->
                <a href="#" class="flex flex-col items-center justify-center w-20 h-full relative group">
                    <div class="absolute -top-5 w-14 h-14 rounded-full bg-dark-surface border-2 border-neon-purple shadow-neon-purple flex items-center justify-center group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-gift text-neon-purple text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold uppercase text-neon-purple mt-8">Prêmios</span>
                </a>
                
                <!-- Aprovação (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-check-double text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Validar</span>
                </a>
            </div>
        </nav>

    </main>

    <style>
        @keyframes shimmer {
            100% { left: 200%; }
        }
    </style>

  <script>
    // ── Biblioteca de recompensas ─────────────────────────────
    const REWARD_LIB_KEY = 'tf_reward_library';

    const DEFAULT_REWARD_TEMPLATES = [
      { id: 1, name: 'Passeio no parque',  cost: 100 },
      { id: 2, name: 'Cinema',             cost: 150 },
      { id: 3, name: 'Brinquedo',          cost: 200 },
      { id: 4, name: '1h de videogame',    cost:  50 },
      { id: 5, name: 'Sorvete',            cost:  75 },
      { id: 6, name: 'Noite do pijama',    cost: 300 },
    ];

    function loadRewardTemplates() {
      try { return JSON.parse(localStorage.getItem(REWARD_LIB_KEY)) || DEFAULT_REWARD_TEMPLATES; }
      catch { return DEFAULT_REWARD_TEMPLATES; }
    }
    function saveRewardTemplates(list) {
      localStorage.setItem(REWARD_LIB_KEY, JSON.stringify(list));
    }

    function renderRewardLibrary() {
      const list = loadRewardTemplates();
      const container = document.getElementById('reward-template-list');
      container.innerHTML = '';
      list.forEach(t => {
        const row = document.createElement('div');
        row.className = 'glass-panel rounded-[16px] px-4 py-3 border border-yellow-400/20 flex items-center gap-3';
        row.innerHTML = `
          <button onclick="applyRewardTemplate(${t.id})"
                  class="flex-1 min-w-0 text-left flex items-center gap-3 group">
            <div class="w-8 h-8 rounded-lg bg-dark-bg border border-yellow-400/30 flex items-center justify-center flex-shrink-0 group-hover:border-yellow-400 transition-colors">
              <i class="fa-solid fa-gift text-yellow-400 text-xs"></i>
            </div>
            <span class="font-display text-sm text-white group-hover:text-yellow-400 transition-colors break-words leading-tight">${t.name}</span>
          </button>
          <div class="flex items-center gap-1 px-2 py-1 rounded-lg bg-dark-bg border border-yellow-400/30 flex-shrink-0">
            <input type="number" value="${t.cost}" min="1" max="99999"
                   onchange="updateRewardTemplateCost(${t.id}, this.value)"
                   onclick="event.stopPropagation()"
                   class="w-14 bg-transparent text-yellow-400 font-display text-sm text-center outline-none" />
            <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
          </div>
          <button onclick="editRewardTemplateName(${t.id})"
                  class="text-gray-600 hover:text-neon-purple transition-colors flex-shrink-0" title="Editar nome">
            <i class="fa-solid fa-pen text-xs"></i>
          </button>
          <button onclick="deleteRewardTemplate(${t.id})"
                  class="text-gray-600 hover:text-neon-pink transition-colors flex-shrink-0" title="Remover">
            <i class="fa-solid fa-trash-can text-xs"></i>
          </button>`;
        container.appendChild(row);
      });
    }

    function applyRewardTemplate(id) {
      const t = loadRewardTemplates().find(x => x.id === id);
      if (!t) return;
      const nameInput = document.querySelector('#reward-creation-form input[type="text"]');
      const costInput = document.querySelector('#reward-creation-form input[type="number"]');
      if (nameInput) nameInput.value = t.name;
      if (costInput) costInput.value = t.cost;
      nameInput?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      nameInput?.focus();
    }

    function updateRewardTemplateCost(id, val) {
      const list = loadRewardTemplates();
      const t = list.find(x => x.id === id);
      if (t) { t.cost = Math.max(1, parseInt(val) || 1); saveRewardTemplates(list); }
    }

    function editRewardTemplateName(id) {
      const t = loadRewardTemplates().find(x => x.id === id);
      if (!t) return;
      const newName = prompt('Editar nome do prêmio:', t.name);
      if (!newName?.trim()) return;
      const list = loadRewardTemplates();
      const item = list.find(x => x.id === id);
      if (item) { item.name = newName.trim(); saveRewardTemplates(list); renderRewardLibrary(); }
    }

    function deleteRewardTemplate(id) {
      saveRewardTemplates(loadRewardTemplates().filter(x => x.id !== id));
      renderRewardLibrary();
    }

    function addRewardTemplate() {
      const name = prompt('Nome do novo prêmio:');
      if (!name?.trim()) return;
      const cost = parseInt(prompt('Custo em estrelas:', '50')) || 50;
      const list = loadRewardTemplates();
      const newId = Math.max(0, ...list.map(x => x.id)) + 1;
      list.push({ id: newId, name: name.trim(), cost });
      saveRewardTemplates(list); renderRewardLibrary();
    }

    document.addEventListener('DOMContentLoaded', renderRewardLibrary);
    // ─────────────────────────────────────────────────────────
  </script>
    <script src="tarefito-supabase.js"></script>
    <script src="tarefito-nav.js"></script>
</body>
</html>
