<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Criador de Missões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            green: '#22c55e',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        },
                        dark: {
                            bg: '#0b0e14',
                            surface: '#161b22',
                            card: '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-blue': '0 0 15px rgba(59,130,246,0.5)',
                        'neon-green': '0 0 15px rgba(34,197,94,0.5)',
                        'neon-pink': '0 0 15px rgba(236,72,153,0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(0,0,0,0.5)',
                        'btn-press': 'inset 0 4px 6px rgba(0,0,0,0.3)'
                    },
                    backgroundImage: {
                        'radial-burst': 'radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%)',
                        'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)'

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .input-gaming {
            background: rgba(11, 14, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.2);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gaming:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide for mobile focus */
        }
        
        /* Particle animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* Toggle Switch Gaming */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }
        
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: #161b22;
            border: 2px solid #4b5563;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #9ca3af;
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Custom Radio/Checkbox gaming style */
        .radio-gaming:checked + div {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59,130,246,0.5);
            background-color: rgba(59,130,246,0.1);
        }
        .radio-gaming:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

  <script>
    // ── Biblioteca de templates ───────────────────────────────
    const LIBRARY_KEY = 'tf_task_library';

    const DEFAULT_TEMPLATES = [
      { id: 1, name: 'Arrumar o quarto',                  stars: 5 },
      { id: 2, name: 'Arrumar os brinquedos',             stars: 4 },
      { id: 3, name: 'Fazer a lição de casa',             stars: 2 },
      { id: 4, name: 'Cuidar do pet',                     stars: 3 },
      { id: 5, name: 'Ler 2 páginas do livro combinado',  stars: 4 },
      { id: 6, name: 'Ajudar a preparar a janta',         stars: 2 },
      { id: 7, name: 'Escovar os dentes',                 stars: 2 },
      { id: 8, name: 'Varrer a garagem',                  stars: 2 },
      { id: 9, name: 'Secar a louça',                     stars: 3 },
    ];

    function loadTemplates() {
      try { return JSON.parse(localStorage.getItem(LIBRARY_KEY)) || DEFAULT_TEMPLATES; }
      catch { return DEFAULT_TEMPLATES; }
    }
    function saveTemplates(list) {
      localStorage.setItem(LIBRARY_KEY, JSON.stringify(list));
    }

    function renderLibrary() {
      const list = loadTemplates();
      const container = document.getElementById('template-list');
      container.innerHTML = '';
      list.forEach(t => {
        const row = document.createElement('div');
        row.className = 'glass-panel rounded-[16px] px-4 py-3 border border-neon-cyan/25 flex items-center gap-3';
        row.innerHTML = `
          <button onclick="applyTemplate(${t.id})"
                  class="flex-1 min-w-0 text-left flex items-center gap-3 group">
            <div class="w-8 h-8 rounded-lg bg-dark-bg border border-neon-cyan/40 flex items-center justify-center flex-shrink-0 group-hover:border-neon-cyan transition-colors">
              <i class="fa-solid fa-bolt text-neon-cyan text-xs"></i>
            </div>
            <span class="font-display text-sm text-white group-hover:text-neon-cyan transition-colors break-words leading-tight">${t.name}</span>
          </button>
          <div class="flex items-center gap-1 px-2 py-1 rounded-lg bg-dark-bg border border-yellow-400/30 flex-shrink-0">
            <input type="number" value="${t.stars}" min="1" max="9999"
                   onchange="updateTemplateStars(${t.id}, this.value)"
                   onclick="event.stopPropagation()"
                   class="w-10 bg-transparent text-yellow-400 font-display text-sm text-center outline-none" />
            <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
          </div>
          <input type="text" value="${t.name}"
                 onchange="updateTemplateName(${t.id}, this.value)"
                 onclick="event.stopPropagation()"
                 style="position:absolute;opacity:0;pointer-events:none;" />
          <button onclick="editTemplateName(${t.id})"
                  class="text-gray-600 hover:text-neon-purple transition-colors flex-shrink-0" title="Editar nome">
            <i class="fa-solid fa-pen text-xs"></i>
          </button>
          <button onclick="deleteTemplate(${t.id})"
                  class="text-gray-600 hover:text-neon-pink transition-colors flex-shrink-0" title="Remover">
            <i class="fa-solid fa-trash-can text-xs"></i>
          </button>`;
        container.appendChild(row);
      });
    }

    function applyTemplate(id) {
      const t = loadTemplates().find(x => x.id === id);
      if (!t) return;
      const titleInput = document.querySelector('#mission-basics input[type="text"]');
      if (titleInput) titleInput.value = t.name;
      syncStars(t.stars);
      titleInput?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      titleInput?.focus();
    }

    function updateTemplateStars(id, val) {
      const list = loadTemplates();
      const t = list.find(x => x.id === id);
      if (t) { t.stars = Math.max(1, parseInt(val) || 1); saveTemplates(list); }
    }

    function updateTemplateName(id, val) {
      const list = loadTemplates();
      const t = list.find(x => x.id === id);
      if (t && val.trim()) { t.name = val.trim(); saveTemplates(list); renderLibrary(); }
    }

    function editTemplateName(id) {
      const t = loadTemplates().find(x => x.id === id);
      if (!t) return;
      const newName = prompt('Editar nome da missão:', t.name);
      if (newName?.trim()) { updateTemplateName(id, newName); }
    }

    function deleteTemplate(id) {
      const list = loadTemplates().filter(x => x.id !== id);
      saveTemplates(list); renderLibrary();
    }

    function addTemplate() {
      const name = prompt('Nome da nova missão:');
      if (!name?.trim()) return;
      const stars = parseInt(prompt('Quantas estrelas?', '5')) || 5;
      const list = loadTemplates();
      const newId = Math.max(0, ...list.map(x => x.id)) + 1;
      list.push({ id: newId, name: name.trim(), stars });
      saveTemplates(list); renderLibrary();
    }

    document.addEventListener('DOMContentLoaded', renderLibrary);
    // ─────────────────────────────────────────────────────────

    function syncStars(raw) {
        const val = Math.max(1, parseInt(raw) || 1);
        document.getElementById('stars-input').value = val;
    }
  </script>
