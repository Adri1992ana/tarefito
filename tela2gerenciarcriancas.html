<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefito - Gerenciamento de Filhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            purple: '#a855f7',
                            blue: '#3b82f6',
                            green: '#22c55e',
                            pink: '#ec4899',
                            cyan: '#06b6d4'
                        },
                        dark: {
                            bg: '#0b0e14',
                            surface: '#161b22',
                            card: '#1f2937'
                        }
                    },
                    boxShadow: {
                        'neon-purple': '0 0 15px rgba(168,85,247,0.5)',
                        'neon-blue': '0 0 15px rgba(59,130,246,0.5)',
                        'neon-green': '0 0 15px rgba(34,197,94,0.5)',
                        'neon-pink': '0 0 15px rgba(236,72,153,0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(0,0,0,0.5)',
                        'btn-press': 'inset 0 4px 6px rgba(0,0,0,0.3)'
                    },
                    backgroundImage: {
                        'radial-burst': 'radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%)',
                        'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .input-gaming {
            background: rgba(11, 14, 20, 0.8);
            border: 2px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-gaming:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.5), inset 0 0 10px rgba(168,85,247,0.2);
            outline: none;
        }

        .btn-gaming {
            position: relative;
            transform: translateY(0);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gaming:active {
            transform: translateY(4px);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide for mobile focus */
        }
        
        /* Particle animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* Toggle Switch Gaming */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            background-color: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }
        
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: #161b22;
            border: 2px solid #4b5563;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: #9ca3af;
            border-radius: 50%;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex flex-col font-body bg-radial-burst relative overflow-x-hidden m-0 p-0">

    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-neon-purple opacity-10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-neon-blue opacity-10 blur-[120px]"></div>
    </div>

    <!-- Main Container - Mobile First (375x840 target) -->
    <main class="w-full max-w-[430px] mx-auto min-h-[100dvh] flex flex-col relative z-10 pb-24">
        
        <!-- Top Navigation / Header -->
        <header id="app-header" class="w-full flex items-center justify-between px-6 py-5 sticky top-0 bg-dark-bg/80 backdrop-blur-md z-50 border-b border-gray-800">
            <button class="w-10 h-10 rounded-xl bg-dark-surface border border-gray-700 flex items-center justify-center text-white hover:border-neon-purple transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="font-display text-xl text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                Meus Exploradores
            </h1>
            <div class="w-10 h-10"></div>
        </header>

        <div class="px-6 py-6 flex flex-col gap-6 flex-1">

            <!-- Context Banner -->
            <div class="w-full glass-panel rounded-[20px] p-4 border-l-4 border-neon-blue bg-dark-surface/50 flex items-start gap-3">
                <i class="fa-solid fa-circle-info text-neon-blue mt-1 flex-shrink-0"></i>
                <p class="text-sm text-gray-300 font-bold leading-relaxed">
                    Gerencie os perfis dos seus filhos. Veja o painel, passe o celular ou configure o PIN de cada aventureiro.
                </p>
            </div>

            <!-- Children List -->
            <section id="children-list" class="flex flex-col gap-4">

                <!-- placeholder — substituído pelo JS ao carregar -->
                <div class="glass-panel rounded-[24px] p-5 border border-gray-700 mb-4">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-green-900 to-teal-900
                             border-2 border-neon-green flex items-center justify-center text-2xl font-bold text-white flex-shrink-0">
                            L
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <h3 class="font-display text-lg text-white">Lucas</h3>
                                <i class="fa-solid fa-pen text-gray-600 text-xs"></i>
                            </div>
                            <span class="text-xs text-gray-400 font-bold">
                                <i class="fa-solid fa-star text-yellow-400 text-[10px] mr-1"></i>— estrelas
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between rounded-xl px-4 py-3"
                         style="background:rgba(11,14,20,0.65); border:1px solid rgba(34,197,94,0.35);">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-key text-green-400"></i>
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">PIN</span>
                            <span class="font-display text-green-400 text-base tracking-widest">carregando…</span>
                        </div>
                    </div>
                </div>

                <!-- Botão adicionar nova criança -->
                <button type="button"
                        class="btn-gaming w-full h-14 rounded-[16px] flex items-center justify-center gap-2 text-gray-400"
                        style="border:2px dashed rgba(255,255,255,0.15); background:rgba(255,255,255,0.03);">
                    <i class="fa-solid fa-plus text-lg"></i>
                    <span class="font-display text-base">Novo Explorador</span>
                </button>

            </section>

        </div>

        <!-- Bottom Navigation Bar -->
        <nav class="fixed bottom-0 left-0 w-full bg-dark-bg/95 backdrop-blur-xl border-t border-gray-800 pb-safe z-50">
            <div class="max-w-[430px] mx-auto flex justify-around items-center h-20 px-2">
                <!-- Painel (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Painel</span>
                </a>
                
                <!-- Missões (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-list-check text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Missões</span>
                </a>
                
                <!-- Filhos (Active) -->
                <a href="#" class="flex flex-col items-center justify-center w-20 h-full relative group">
                    <div class="absolute -top-5 w-14 h-14 rounded-full bg-dark-surface border-2 border-neon-purple shadow-neon-purple flex items-center justify-center group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-users text-neon-purple text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold uppercase text-neon-purple mt-8">Filhos</span>
                </a>
                
                <!-- Recompensas (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-gift text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Prêmios</span>
                </a>
                
                <!-- Aprovação (Inactive) -->
                <a href="#" class="flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-check-double text-xl mb-1"></i>
                    <span class="text-[9px] font-bold uppercase">Validar</span>
                </a>
            </div>
        </nav>

    </main>


  <script>/* lógica movida para tarefito-nav.js */</script>
    <script src="tarefito-supabase.js"></script>
    <script src="tarefito-nav.js"></script>
</body>
</html>
